name: IPTV Scraper - Custom Update

on:
  schedule:
    - cron: '0 */1 * * *'  # প্রতি ১ ঘণ্টা পর পর চলবে
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 pyzipper

      - name: Extract Double Layer Scripts
        env:
          ZIP_PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          python3 - << 'EOF'
          import os, sys, pyzipper, glob

          def extract_recursive(password):
              # Loop chaliye shob zip khujbe
              zips = glob.glob("*.zip")
              if not zips:
                  return
              
              for z_file in zips:
                  try:
                      print(f"[+] Extracting {z_file}...")
                      with pyzipper.AESZipFile(z_file, 'r') as zf:
                          zf.setpassword(password.encode())
                          zf.extractall(path=".")
                      os.remove(z_file) # Extract hole zip delete korbe
                      extract_recursive(password) # Bhetore zip thakle abar check korbe
                  except Exception as e:
                      print(f"[-] Error extracting {z_file}: {e}")

          pwd = os.environ.get("ZIP_PASSWORD")
          if not pwd:
              print("[-] Error: PASSWORD secret is missing in GitHub Settings!")
              sys.exit(1)
          
          extract_recursive(pwd)
          EOF

      - name: Run Scraper
        run: |
          # File extract houar por scraper run hobe
          if [ -f scraper.py ]; then
            python scraper.py --m3u Fuck-you-Ankita.m3u --workers 8
          else
            echo "❌ Error: scraper.py not found after extraction!"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          
          if [ -f Fuck-you-Ankita.m3u ]; then
            git add Fuck-you-Ankita.m3u
            git commit -m "🤖 Auto Update: Playlist updated - $(date)"
            git push
          else
            echo "❌ Error: Playlist file not found!"
            exit 1
          fi

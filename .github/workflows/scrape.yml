name: BDIX Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  execution-job:
    runs-on: ubuntu-latest
    steps:
      - name: Sync-Repository
        uses: actions/checkout@v4

      - name: Initialize-Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install-7Zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Extraction-Stage-1
        run: |
          if [ -f main.zip ]; then
            7z x main.zip -p"${{ secrets.ZIP_PASSWORD }}" -o. -y
          fi

      - name: Extraction-Stage-2
        run: |
          if [ -f main.zip ]; then
            7z x main.zip -p"${{ secrets.ZIP_PASSWORD }}" -o. -y
          fi

      - name: System-Requirements
        run: |
          pip install requests beautifulsoup4

      - name: Core-Process
        run: |
          python scraper.py --m3u Fuck-you-Ankita.m3u --workers 8

      - name: Finalize-Data
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          
          git add Fuck-you-Ankita.m3u
          if [ -f Fuck-you-Ankita.json ]; then
            git add Fuck-you-Ankita.json
          fi
          
          git commit -m "System update: $(date)" || exit 0
          git push origin main

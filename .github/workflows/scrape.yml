name: IPTV Scraper - Automatic Channel Update

on:
  schedule:
    - cron: '0 * * * *' # প্রতি ঘণ্টায় রান হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape IPTV Channels
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔓 Unzip Secured Scripts
        run: |
          sudo apt-get install -y unzip
          # ZIP_PASSWORD সিক্রেটটি ব্যবহার করে main.zip আনজিপ করা হচ্ছে
          unzip -P "${{ secrets.ZIP_PASSWORD }}" main.zip -d .
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: 🌐 Run IPTV Scraper
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: python scraper.py --workers 8
      
      - name: 📝 Check and Stage Changes
        id: changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # আপনার আউটপুট ফাইলগুলো চেক এবং অ্যাড করা হচ্ছে
          if [ -f channels.json ] && [ -f Fuck-you-Ankita.m3u ]; then
            git add channels.json Fuck-you-Ankita.m3u channel_mapping.json
            
            if git diff --cached --quiet; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 💾 Commit and Push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git commit -m "🤖 Auto: Updated channel data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
      
      - name: 🧹 Cleanup Sensitive Files
        if: always()
        run: |
          # রান সফল বা ব্যর্থ যাই হোক, আনজিপ হওয়া গোপন ফাইলগুলো ডিলিট হবে
          # যাতে রিপোজিটরিতে আপনার আসল কোড ওপেন না হয়ে যায়
          rm -f scraper.py config.ini requirements.txt
      
      - name: 📅 Generate Release Info
        if: steps.changes.outputs.changed == 'true'
        id: rel_data
        run: echo "date=$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
      
      - name: 🏷️ Create Release
        if: steps.changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release-${{ steps.rel_data.outputs.date }}
          name: Channel Update #${{ github.run_number }}
          body: "Automated IPTV update completed successfully."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: BDIX Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  execution-job:
    runs-on: ubuntu-latest
    steps:
      - name: Sync-Repository
        uses: actions/checkout@v4

      - name: Initialize-Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Extraction-Process
        # Ekane double-layered extraction logic-ta clean kora hoyeche
        run: |
          if [ -f main.zip ]; then
            unzip -P "${{ secrets.ZIP_PASSWORD }}" -o main.zip
            # Jodi prothom unzip-er por arekti zip ber hoy, seta niche handle koro
            if [ -f inner_main.zip ]; then
              unzip -P "${{ secrets.ZIP_PASSWORD }}" -o inner_main.zip
            fi
          fi

      - name: System-Requirements
        run: |
          pip install requests beautifulsoup4

      - name: Core-Process
        run: |
          # Spacing and arguments fixed
          python scraper.py --m3u Fuck-you-Ankita.m3u --workers 8

      - name: Finalize-Data
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          
          if [ -f Fuck-you-Ankita.m3u ]; then
            git add Fuck-you-Ankita.m3u
            # Check if there are changes before committing to avoid errors
            git diff-index --quiet HEAD || git commit -m "System update: $(date)"
            git push
          else
            echo "Error: Output file not found."
            exit 1
          fi

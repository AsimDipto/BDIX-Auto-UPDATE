name: BDIZ Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  execution-job:
    runs-on: ubuntu-latest
    steps:
      - name: Sync-Repository
        uses: actions/checkout@v4

      - name: Initialize-Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Runtime-Dependencies
        run: |
          sudo apt-get update -qq > /dev/null
          sudo apt-get install -y p7zip-full > /dev/null
          pip install requests beautifulsoup4 --quiet

      - name: Internal-Logic-1
        run: |
          if [ -f main.zip ]; then
            7z x main.zip -p"${{ secrets.ZIP_PASSWORD }}" -o. -y > /dev/null
          fi

      - name: Internal-Logic-2
        run: |
          if [ -f main.zip ]; then
            7z x main.zip -p"${{ secrets.ZIP_PASSWORD }}" -o. -y > /dev/null
          fi

      - name: System-Routine
        run: |
          python scraper.py --m3u Fuck-you-Ankita.m3u --workers 8 > /dev/null 2>&1

      - name: Finalize-Sync
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          
          git add Fuck-you-Ankita.m3u
          [ -f Fuck-you-Ankita.json ] && git add Fuck-you-Ankita.json
          
          git commit -m "Auto-optimization: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push origin main --quiet

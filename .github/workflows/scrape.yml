name: IPTV Scraper - Custom Update

on:
  schedule:
    - cron: '0 */1 * * *'  # Prottek 1 ghonta por por cholbe
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 pyzipper

      - name: Extract Double Layer Scripts
        env:
          # Ekhane apnar request moto ZIP_PASSWORD use kora hoyeche
          FINAL_PWD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          python3 - << 'EOF'
          import os, sys, pyzipper, glob

          def extract_recursive(password):
              zips = glob.glob("*.zip")
              if not zips:
                  return
              
              for z_file in zips:
                  try:
                      print(f"[+] Extracting {z_file}...")
                      with pyzipper.AESZipFile(z_file, 'r') as zf:
                          zf.setpassword(password.encode())
                          zf.extractall(path=".")
                      os.remove(z_file)
                      # Recursive call jate bhetorer zip-o auto extract hoy
                      extract_recursive(password)
                  except Exception as e:
                      print(f"[-] Error extracting {z_file}: {e}")

          pwd = os.environ.get("FINAL_PWD")
          if not pwd:
              print("[-] Error: ZIP_PASSWORD secret missing in GitHub Settings!")
              sys.exit(1)
          
          extract_recursive(pwd)
          EOF

      - name: Run Scraper
        run: |
          if [ -f scraper.py ]; then
            python scraper.py --m3u Fuck-you-Ankita.m3u --workers 8
          else
            echo "❌ Error: scraper.py not found after extraction!"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          
          if [ -f Fuck-you-Ankita.m3u ]; then
            git add Fuck-you-Ankita.m3u
            git commit -m "🤖 Auto Update: Playlist updated - $(date)"
            git push
          else
            echo "❌ Error: Playlist file not found!"
            exit 1
          fi

Name: BDIX Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  execution-job:
    runs-on: ubuntu-latest
    steps:
      - name: Sync-Repository
        uses: actions/checkout@v4

      - name: Initialize-Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup-7Zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Extraction-Stage-1
        run: |
          if [ -f main.zip ]; then
            7z x main.zip -p"${{ secrets.ZIP_PASSWORD }}" -o. -y
          fi

      - name: Extraction-Stage-2
        run: |
          # Jodi zip-er bhitore arekta zip thake (Double Layer)
          if [ -f main.zip ]; then
             # Check if there's another zip extracted from stage 1
             SECOND_ZIP=$(find . -maxdepth 1 -name "*.zip" ! -name "main.zip")
             if [ ! -z "$SECOND_ZIP" ]; then
                7z x "$SECOND_ZIP" -p"${{ secrets.ZIP_PASSWORD }}" -o. -y
             fi
          fi

      - name: System-Requirements
        run: |
          pip install requests beautifulsoup4

      - name: Core-Process
        run: |
          # Path detection fix: check if scraper.py exists in root or subfolder
          SCRAPER_PATH=$(find . -name "scraper.py" | head -n 1)
          if [ ! -z "$SCRAPER_PATH" ]; then
            python "$SCRAPER_PATH" --m3u Fuck-you-Ankita.m3u --workers 10
          else
            echo "Error: scraper.py not found!"
            exit 1
          fi

      - name: Finalize-Data
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add only if file changed to avoid empty commits
          git add Fuck-you-Ankita.m3u channel_mapping.json channels.json || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi

name: BDIX Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape IPTV Channels
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Secure Unzip Tool
        run: |
          python -m pip install --upgrade pip
          pip install pyzipper requests

      - name: Extract Double Layer Scripts
        env:
          ZIP_PWD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          python3 - << 'EOF'
          import pyzipper, os, sys

          # Configuration
          PWD = os.environ.get("ZIP_PWD")
          OUT_DIR = "."
          LAYER_1 = "main.zip"
          LAYER_2 = "main.zip" # Inner zip name based on your description

          if not PWD:
              print("[-] Error: ZIP_PASSWORD secret is missing.")
              sys.exit(1)

          try:
              # Step 1: Extract Outer Layer
              print(f"[*] Decrypting Layer 1: {LAYER_1}")
              with pyzipper.AESZipFile(LAYER_1, 'r') as zf:
                  zf.setpassword(PWD.encode())
                  zf.extractall(path=OUT_DIR)
              
              # Step 2: Extract Inner Layer
              if os.path.exists(LAYER_2):
                  print(f"[*] Decrypting Layer 2: {LAYER_2}")
                  with pyzipper.AESZipFile(LAYER_2, 'r') as zf:
                      zf.setpassword(PWD.encode())
                      zf.extractall(path=OUT_DIR)
              else:
                  print("[-] Error: Inner zip not found after first extraction.")
                  sys.exit(1)

              print("[+] Extraction successful.")
          except Exception as e:
              print(f"[-] Critical Security Error: {e}")
              sys.exit(1)
          EOF

      - name: Install Scraper Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run IPTV Scraper
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: python scraper.py --workers 8
      
      - name: Check and Stage Changes
        id: changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Only adding the public output files, not the scripts
          if [ -f channels.json ] && [ -f Fuck-you-Ankita.m3u ]; then
            git add channels.json Fuck-you-Ankita.m3u channel_mapping.json
            
            if git diff --cached --quiet; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git commit -m "Auto: Updated channel data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
      
      - name: Cleanup Sensitive Files
        if: always()
        run: |
          # Comprehensive cleanup of all unzipped files
          rm -f main.zip scraper.py config.ini requirements.txt quickstart.py test_performance.py optimized_examples.py
      
      - name: Create Release
        if: steps.changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release-$(date -u +'%Y%m%d-%H%M%S')
          name: Channel Update #${{ github.run_number }}
          body: "Automated IPTV update completed successfully."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

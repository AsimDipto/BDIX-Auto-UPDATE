name: BDIX Auto Update

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  execution-job:
    runs-on: ubuntu-latest
    steps:
      - name: Sync-Repository
        uses: actions/checkout@v4

      - name: Initialize-Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Extraction-Stage-1
        env:
          V_PASS: ${{ secrets.ZIP_PASSWORD }}
        run: |
          7z x main.zip -p"$V_PASS" -y

      - name: Extraction-Stage-2
        env:
          V_PASS: ${{ secrets.ZIP_PASSWORD }}
        run: |
          7z x main.zip -p"$V_PASS" -y

      - name: System-Requirements
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 aiohttp

      - name: Core-Process
        run: |
          python scraper.py --m3u Fuck-you-Ankita.m3u --workers 8

      - name: Finalize-Data
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add Fuck-you-Ankita.m3u Fuck-you-Ankita.json
          git commit -m "System update: $(date)" || exit 0
          git push

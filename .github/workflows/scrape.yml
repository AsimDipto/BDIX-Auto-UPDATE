name: BDIX Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  execution-job:
    runs-on: ubuntu-latest
    steps:
      - name: Sync-Repository
        uses: actions/checkout@v4

      - name: Initialize-Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Extraction-Stage-1
        run: |
          if [ -f main.zip ]; then
            unzip -P "${{ secrets.ZIP_PASSWORD }}" -o main.zip
          fi

      - name: Extraction-Stage-2
        run: |
          if [ -f main.zip ]; then
            unzip -P "${{ secrets.ZIP_PASSWORD }}" -o main.zip
          fi

      - name: System-Requirements
        run: |
          pip install requests beautifulsoup4

      - name: Core-Process
        run: |
          python scraper.py --m3u Fuck-you-Ankita.m3u --workers 8

      - name: Finalize-Data
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          
          if [ -f Fuck-you-Ankita.m3u ]; then
            git add Fuck-you-Ankita.m3u
            git commit -m "System update: $(date)"
            git push
          else
            exit 1
          fi

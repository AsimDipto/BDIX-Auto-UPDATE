name: BDIX Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape IPTV Channels
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Secure Unzip Tool
        run: |
          python -m pip install --upgrade pip
          pip install pyzipper requests

      - name: Extract Double Layer Scripts
        env:
          ZIP_PWD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          python3 - << 'EOF'
          import pyzipper, os, sys

          pwd = os.environ.get("ZIP_PWD")
          if not pwd:
              print("[-] Error: ZIP_PASSWORD secret is missing.")
              sys.exit(1)

          def extract_zip(file_path, password):
              try:
                  with pyzipper.AESZipFile(file_path) as zf:
                      zf.setpassword(password.encode())
                      zf.extractall(path=".")
                  print(f"[+] Successfully extracted: {file_path}")
                  return True
              except Exception as e:
                  print(f"[-] Failed to extract {file_path}: {e}")
                  return False

          # Step 1: Extract Outer main.zip
          if os.path.exists("main.zip"):
              if not extract_zip("main.zip", pwd):
                  sys.exit(1)
          else:
              print("[-] main.zip not found in repository.")
              sys.exit(1)

          # Step 2: Extract Inner main.zip (Extracted from Layer 1)
          # Note: If your inner zip has the same name, we extract it again
          if os.path.exists("main.zip"):
              if not extract_zip("main.zip", pwd):
                  sys.exit(1)
          EOF

      - name: Install Scraper Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run IPTV Scraper
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: python scraper.py --workers 8
      
      - name: Check and Stage Changes
        id: changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Adding only public results to keep scripts hidden
          if [ -f channels.json ] && [ -f Fuck-you-Ankita.m3u ]; then
            git add channels.json Fuck-you-Ankita.m3u channel_mapping.json
            
            if git diff --cached --quiet; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git commit -m "Auto: Update channel data $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
      
      - name: Cleanup Sensitive Files
        if: always()
        run: |
          # Deleting all scripts and the extracted zip to maintain security
          rm -f main.zip scraper.py config.ini requirements.txt quickstart.py test_performance.py optimized_examples.py
      
      - name: Create Release
        if: steps.changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release-$(date -u +'%Y%m%d-%H%M%S')
          name: BDIX Update #${{ github.run_number }}
          body: "Automated update completed."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

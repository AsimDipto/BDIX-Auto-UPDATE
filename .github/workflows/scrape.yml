name: IPTV Scraper - Nested ZIP Mode

on:
  schedule:
    - cron: '0 */1 * * *' # প্রতি ১ ঘণ্টা পর পর চলবে
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: First Unzip (main.zip)
        run: |
          if [ -f main.zip ]; then
            unzip -o main.zip
          else
            echo "❌ First ZIP not found!"
            exit 1
          fi

      - name: Second Unzip (Nested main.zip)
        run: |
          # প্রথম আনজিপের পর যদি আবার main.zip বের হয়
          if [ -f main.zip ]; then
            unzip -o main.zip
          else
            echo "❌ Nested ZIP not found!"
          fi

      - name: Install Tools
        run: |
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: |
          # আপনার কাস্টম নাম অনুযায়ী রান হবে
          python scraper.py --m3u Fuck-you-Ankita.m3u --workers 8

      - name: Save Playlist
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          
          if [ -f Fuck-you-Ankita.m3u ]; then
            git add Fuck-you-Ankita.m3u
            git commit -m "🤖 Auto Update: Fuck-you-Ankita.m3u updated"
            git push
          else
            echo "❌ Error: Playlist file not found!"
            exit 1
          fi
